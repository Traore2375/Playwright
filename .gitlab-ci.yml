stages:
  - build
  - test
  - report

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  PLAYWRIGHT_BROWSERS_PATH: "0"
  ENV: "qa"

cache:
  paths:
    - .m2/repository

before_script:
  - echo "Starting CI for Playwright Java project"
  - mvn -version

# 🧱 BUILD
build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn clean install -DskipTests
  artifacts:
    paths:
      - target/
    expire_in: 1 day

# 🧪 TEST (MANUEL)
test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  when: manual

  script:
    - echo "Running tests on ENV=$ENV"
    - mvn exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install"
    - mvn test -Denv=$ENV -Dmaven.test.failure.ignore=true

  artifacts:
    when: always
    paths:
      - target/
      - target/cucumber-reports/
      - target/surefire-reports/
    reports:
      junit: target/surefire-reports/*.xml

# 📊 REPORT (corrigé)
report:
  stage: report
  image: alpine:latest

  when: manual
  needs: ["test"]   # 🔥 IMPORTANT : dépend du job test

  script:
    - echo "Publishing reports..."

  artifacts:
    paths:
      - target/cucumber-reports/
      - target/surefire-reports/
    expire_in: 7 days