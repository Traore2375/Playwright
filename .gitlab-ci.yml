stages:
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  PLAYWRIGHT_BROWSERS_PATH: "0"
  ENV: "qa"
  HEADLESS: "true"

cache:
  paths:
    - .m2/repository

test:
  stage: test

  image: mcr.microsoft.com/playwright/java:v1.40.0-jammy

  script:
    - echo "Running tests on ENV=$ENV with HEADLESS=$HEADLESS"

    # 🔥 Run tests Maven + Cucumber + Playwright
    - mvn clean test -Denv=$ENV -Dheadless=$HEADLESS

    # 🔥 Génération explicite rapport Cucumber (si plugin actif)
    - echo "Ensuring cucumber reports are generated..."

  artifacts:
    when: always
    paths:
      # 📦 Maven results
      - target/

      # 🧪 JUnit (GitLab Test tab)
      - target/surefire-reports/

      # 🥒 Cucumber JSON / HTML reports
      - target/cucumber-reports/
      - target/cucumber-reports/**/*.html
      - target/cucumber-reports/**/*.json

      # 🌐 Playwright HTML report
      - target/playwright-report/
      - target/playwright-report/index.html

    expire_in: 7 days