stages:
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  PLAYWRIGHT_BROWSERS_PATH: "0"
  ENV: "qa"
  HEADLESS: "true"

cache:
  paths:
    - .m2/repository

test:
  stage: test

  image: mcr.microsoft.com/playwright/java:v1.40.0-jammy

  script:
    - echo "Running tests on ENV=$ENV with HEADLESS=$HEADLESS"

    # 🔥 exécution tests
    - mvn clean test -Denv=$ENV -Dheadless=$HEADLESS

    # 🔥 génération report HTML Playwright (si activé côté framework)
    - echo "Generating HTML reports..."

  artifacts:
    when: always
    paths:
      # 📊 reports Maven + tests
      - target/

      # 🧪 JUnit (GitLab Test tab)
      - target/surefire-reports/

      # 🥒 Cucumber report (si utilisé)
      - target/cucumber-reports/

      # 🌐 HTML Playwright report (IMPORTANT)
      - target/playwright-report/
      - target/playwright-report/index.html

    expire_in: 7 days