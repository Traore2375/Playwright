stages:
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  PLAYWRIGHT_BROWSERS_PATH: "0"
  ENV: "qa"
  HEADLESS: "true"

cache:
  paths:
    - .m2/repository

test:
  stage: test

  image: mcr.microsoft.com/playwright/java:v1.40.0-jammy

  script:
    - echo "Running tests on ENV=$ENV with HEADLESS=$HEADLESS"

    # 🔥 Run tests (fail visible, pas masqué)
    - mvn clean test -Denv=$ENV -Dheadless=$HEADLESS

    # 🔍 Debug obligatoire
    - echo "=== TARGET CONTENT ==="
    - ls -R target

  artifacts:
    when: always
    paths:
      # 📦 Maven output
      - target/

      # 🧪 JUnit (GitLab test tab)
      - target/surefire-reports/

      # 🥒 Cucumber (HTML + JSON via runner Java)
      - target/cucumber-reports/

    reports:
      junit: target/surefire-reports/*.xml

    expire_in: 7 days